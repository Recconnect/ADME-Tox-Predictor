upstream admetox_api {
    server 127.0.0.1:8000;
}

upstream admetox_ui {
    server 127.0.0.1:8501;
}

server {
    listen 80;
    server_name admetox.ai www.admetox.ai;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admetox.ai www.admetox.ai;

    ssl_certificate     /etc/letsencrypt/live/admetox.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admetox.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/admetox/landing;
    index index.html;

    # Landing page (static)
    location / {
        try_files $uri $uri/ =404;
    }

    # FastAPI API
    location /api/ {
        proxy_pass http://admetox_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Streamlit UI
    location /ui/ {
        proxy_pass http://admetox_ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
