name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download models
        run: |
          python -c "
          import requests, zipfile, io, os
          url = 'https://github.com/bradist/ADME-Tox-Predictor/releases/download/v2.0/models.zip'
          r = requests.get(url)
          z = zipfile.ZipFile(io.BytesIO(r.content))
          z.extractall('models/')
          print('Models downloaded')
          " || echo "Models not available, training from scratch..."

      - name: Train models if needed
        run: |
          if ! ls models/*.pkl 1>/dev/null 2>&1; then
            python run_train.py
          else
            echo "Models exist, skipping training"
          fi

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
