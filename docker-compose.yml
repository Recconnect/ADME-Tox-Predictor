version: "3.9"

x-defaults: &defaults
  restart: unless-stopped
  env_file: .env

services:
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    depends_on:
      - api
      - ui
    <<: *defaults

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    expose:
      - "8000"
    volumes:
      - ./models:/app/models
      - usage-data:/app/data
    environment:
      - ADMETOX_JWT_SECRET=${ADMETOX_JWT_SECRET:?err}
      - ADMETOX_API_KEYS=${ADMETOX_API_KEYS:-}
      - ADMETOX_CORS_ORIGINS=${ADMETOX_CORS_ORIGINS:-https://admetox.ai}
    <<: *defaults

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: ui
    expose:
      - "8501"
    environment:
      - ADMETOX_JWT_SECRET=${ADMETOX_JWT_SECRET:?err}
    <<: *defaults

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    entrypoint: >
      sh -c "certbot certonly --webroot -w /var/www/certbot
      -d '$${DOMAIN:?err}' -d 'www.$${DOMAIN:?err}'
      --email '$${SSL_EMAIL:?err}' --agree-tos --non-interactive
      && echo 'Certificates obtained. Renewal handled via cron.'"
    profiles:
      - setup
    <<: *defaults

volumes:
  certbot-www:
  certbot-etc:
  usage-data:
